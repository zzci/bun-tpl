name: release

on:
  push:
    tags: ["v*"]

# Minimal default — the publishing job widens this to exactly what it needs.
permissions:
  contents: read

env:
  COSIGN_VERSION: v2.4.3
  SYFT_VERSION: v1.18.1

jobs:
  image:
    name: build + push image to ghcr.io
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Manual-approval gate: pushing a `v*` tag does not auto-publish — a
    # reviewer must approve the deployment to this Environment first. The
    # Environment (and its required reviewers) is configured in repo settings.
    environment: release
    permissions:
      contents: read
      packages: write   # push image to ghcr.io
      id-token: write    # cosign keyless (OIDC) signing
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Dockerfile pins compile to bun-linux-x64; ship linux/amd64 only.
      # Adding linux/arm64 requires teaching compile.ts to honour
      # $TARGETPLATFORM and is left as a separate change.
      - name: Build + push (with provenance + SBOM)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: BUILD_COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      # Sign the image once by its immutable digest. All tags
      # (latest, vX.Y.Z, vX.Y, …) resolve to this same digest, so a single
      # signature covers every tag and avoids re-signing mutable tag strings.
      - name: Sign image (keyless, by digest)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "ghcr.io/${{ github.repository }}@${DIGEST}"

      # Verify the signature we just created against the same digest so a
      # signing misconfiguration (wrong OIDC identity, failed upload, …)
      # fails the release instead of shipping an unverifiable image.
      - name: Verify signature (keyless, by digest)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/release.yml@" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "ghcr.io/${{ github.repository }}@${DIGEST}"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: ${{ env.SYFT_VERSION }}

      - name: Generate + attach SBOM
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_REF: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail
          syft -o spdx-json "${IMAGE_REF}@${DIGEST}" > sbom.spdx.json
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE_REF}@${DIGEST}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom.spdx.json
          retention-days: 90
