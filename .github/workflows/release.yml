name: release

# Builds and uploads the lode release asset to an existing GitHub Release.
#
# Release publishing is the source of truth: the workflow runs when a release
# is published (UI or `gh release create`), which attaches the assets. It is
# intentionally not triggered by tag pushes, avoiding a tag/release mismatch.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to rebuild and upload assets for, e.g. v0.1.2"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  BUN_VERSION: "1.3.14"
  NODE_VERSION: "22.13.0"
  APP_NAME: app
  ASSET_SUFFIX: linux-x64
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  asset:
    name: build and upload lode release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # Resolves TAG_NAME / RELEASE_VERSION / ASSET_NAME / ASSET_URL into
      # $GITHUB_ENV for the steps below.
      - name: Resolve release metadata
        run: bash scripts/ci/release-metadata.sh

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # package.ts reads APP_NAME / RELEASE_VERSION / ASSET_NAME / ASSET_URL
      # from the environment, so no flags are needed here.
      - name: Package lode asset
        run: bun run package

      - name: Validate lode release assets
        run: bun scripts/ci/validate-lode-release.ts

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci/upload-release.sh
