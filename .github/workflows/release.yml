name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write       # cosign keyless signing

env:
  COSIGN_VERSION: v2.4.3
  SYFT_VERSION: v1.18.1

jobs:
  image:
    name: build + push image to ghcr.io
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Dockerfile pins compile to bun-linux-x64; ship linux/amd64 only.
      # Adding linux/arm64 requires teaching compile.ts to honour
      # $TARGETPLATFORM and is left as a separate change.
      - name: Build + push (with provenance + SBOM)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "$TAGS"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: ${{ env.SYFT_VERSION }}

      - name: Generate + attach SBOM
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_REF: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail
          syft -o spdx-json "${IMAGE_REF}@${DIGEST}" > sbom.spdx.json
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE_REF}@${DIGEST}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom.spdx.json
          retention-days: 90
