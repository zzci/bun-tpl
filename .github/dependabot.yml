version: 2
updates:
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      runtime:
        dependency-type: production
        update-types: [patch, minor]
      tooling:
        dependency-type: development
        update-types: [patch, minor]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
