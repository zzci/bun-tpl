issuer: http://127.0.0.1:5566/dex
storage:
  type: memory
web:
  http: 127.0.0.1:5566
  allowedOrigins: ["*"]
oauth2:
  skipApprovalScreen: true
expiry:
  idTokens: "1h"
  refreshTokens:
    validIfNotUsedFor: "2h"
staticClients:
  - id: app
    secret: app-secret
    redirectURIs:
      - http://127.0.0.1:3010/app/api/account/auth/callback
    name: App
enablePasswordDB: true
staticPasswords:
  - email: admin@example.com
    hash: "$2b$10$ZDM1j7ol1V4C0pDIyN.uu.eitELj7.LOvYhkA5nXLi/yBoP9.mynC"
    username: admin
    userID: dex-admin
  - email: user@example.com
    hash: "$2b$10$ZDM1j7ol1V4C0pDIyN.uu.eitELj7.LOvYhkA5nXLi/yBoP9.mynC"
    username: user
    userID: dex-user
